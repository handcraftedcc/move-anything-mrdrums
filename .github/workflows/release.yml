name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example v0.0.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cross compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build release tarball
        run: |
          chmod +x scripts/build.sh
          CROSS_PREFIX=aarch64-linux-gnu- ./scripts/build.sh
          test -f dist/mrdrums-module.tar.gz

      - name: Verify GLIBC Compatibility
        run: |
          syms="$(strings dist/mrdrums/dsp.so | grep -oE 'GLIBC_[0-9]+\.[0-9]+' || true)"
          if [ -z "$syms" ]; then
            echo "No GLIBC symbols found in dsp.so (unexpected)."
            exit 1
          fi
          max_glibc="$(echo "$syms" | sed 's/GLIBC_//' | sort -V | tail -n 1)"
          echo "Max GLIBC symbol: $max_glibc"
          if [ "$(printf '%s\n' "$max_glibc" "2.17" | sort -V | tail -n 1)" != "2.17" ]; then
            echo "Incompatible GLIBC symbol version detected: $max_glibc (expected <= 2.17)"
            exit 1
          fi

      - name: Resolve release tag
        id: release_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.release_tag.outputs.tag }}
          tag_name: ${{ steps.release_tag.outputs.tag }}
          generate_release_notes: true
          files: dist/mrdrums-module.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
